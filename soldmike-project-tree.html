<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLDMIKE — Master Project Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4ef;min-height:100vh}
.top{background:#1a1a18;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.top h1{font-size:15px;font-weight:500;color:#fff}
.top span{font-size:12px;color:#6b6a65}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:14px 28px;background:#fff;border-bottom:1px solid #e0dfd8;font-size:12px;color:#6b6a65;align-items:center}
.ld{width:13px;height:13px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
.ld-dash{border:2px dashed #E24B4A;background:#FFF5F5}
.tree-wrap{padding:28px;overflow-x:auto;min-height:calc(100vh - 100px)}
.tree-inner{min-width:4200px;background:#fff;border-radius:14px;border:1px solid #e0dfd8;padding:36px 40px 48px}
svg{display:block}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.stats{display:flex;gap:24px;padding:12px 28px;background:#f9f8f4;border-bottom:1px solid #e0dfd8;font-size:12px;color:#6b6a65}
.stat{display:flex;align-items:center;gap:6px;}
.stat strong{color:#1a1a18;font-weight:600;}
</style>
</head>
<body>

<div class="top">
  <h1>SOLDMIKE — Master Project Tree</h1>
  <span>6 sections · 27 projects · Scroll right →</span>
</div>

<div class="stats">
  <div class="stat">🟢 <strong id="s-done">—</strong> done</div>
  <div class="stat">🟡 <strong id="s-prog">—</strong> in progress</div>
  <div class="stat">⬜ <strong id="s-todo">—</strong> to do</div>
  <div class="stat">🔴 <strong id="s-miss">—</strong> missing</div>
  <div class="stat">🟣 <strong id="s-park">—</strong> parked</div>
  <div class="stat">🟠 <strong id="s-block">—</strong> blocked</div>
</div>

<div class="legend">
  <strong style="color:#1a1a18">Legend:</strong>
  <span><span class="ld" style="background:#E1F5EE;border:1px solid #1D9E75"></span>Done</span>
  <span><span class="ld" style="background:#FAEEDA;border:1px solid #EF9F27"></span>In Progress</span>
  <span><span class="ld" style="background:#F1EFE8;border:1px solid #B4B2A9"></span>To Do</span>
  <span><span class="ld ld-dash"></span>Missing leaf</span>
  <span><span class="ld" style="background:#FAECE7;border:1px solid #D85A30"></span>Blocked</span>
  <span><span class="ld" style="background:#EEEDFE;border:1px solid #AFA9EC"></span>Parked</span>
</div>

<div class="tree-wrap">
<div class="tree-inner">
<svg id="tree-svg"></svg>
</div>
</div>

<script>
const PITCH = 92;
const LEFT_PAD = 48;
const SEC_GAP = 32;
const LEAF_W = 82, LEAF_H = 40;
const PROJ_W = 118, PROJ_H = 42;
const SEC_W = 154, SEC_H = 46;
const ROOT_W = 210, ROOT_H = 50;
const Y_ROOT = 68;
const Y_SEC = 172;
const Y_PROJ = 280;
const Y_LEAF = 390;

const ST = {
  done:    {fill:'#E1F5EE',stroke:'#1D9E75',tf:'#085041',sf:'#04342C'},
  prog:    {fill:'#FAEEDA',stroke:'#EF9F27',tf:'#633806',sf:'#412402'},
  todo:    {fill:'#F1EFE8',stroke:'#C8C7C0',tf:'#5F5E5A',sf:'#444441'},
  blocked: {fill:'#FAECE7',stroke:'#D85A30',tf:'#712B13',sf:'#4A1B0C'},
  parked:  {fill:'#EEEDFE',stroke:'#AFA9EC',tf:'#534AB7',sf:'#3C3489'},
  missing: {fill:'#FFF5F5',stroke:'#E24B4A',tf:'#A32D2D',sf:'#791F1F',dash:true},
  queued:  {fill:'#FAEEDA',stroke:'#EF9F27',tf:'#633806',sf:'#412402'},
};

const SEC_STYLES = {
  re:   {fill:'#E1F5EE',stroke:'#1D9E75',tf:'#04342C'},
  mkt:  {fill:'#E6F1FB',stroke:'#378ADD',tf:'#042C53'},
  tpm:  {fill:'#FAECE7',stroke:'#D85A30',tf:'#4A1B0C'},
  prod: {fill:'#EEEDFE',stroke:'#534AB7',tf:'#26215C'},
  biz:  {fill:'#F1EFE8',stroke:'#888780',tf:'#2C2C2A'},
  per:  {fill:'#FAEEDA',stroke:'#BA7517',tf:'#412402'},
};

const data = [
  {id:'re', name:'Real Estate', sub:'7 projects', projects:[
    {name:'FUB CRM Build', status:'done', leaves:[
      {name:'Custom Fields',sub:'55 fields',status:'done'},
      {name:'Tags',sub:'45 deployed',status:'done'},
      {name:'Smart Lists',sub:'7 live',status:'done'},
    ]},
    {name:'FUB Email Campaign', status:'queued', leaves:[
      {name:'Buyer Campaign',sub:'58 emails ✓',status:'done'},
      {name:'Seller Campaign',sub:'← missing leaf',status:'missing'},
    ]},
    {name:'Property Websites', status:'done', leaves:[
      {name:'SOLDMIKE',sub:'variant live',status:'done'},
      {name:'OP Team',sub:'variant live',status:'done'},
      {name:'Agent Client',sub:'variant live',status:'done'},
    ]},
    {name:'Form 290 HTML', status:'prog', leaves:[
      {name:'Page 1',sub:'complete ✓',status:'done'},
      {name:'Page 2',sub:'in progress',status:'prog'},
      {name:'Page 3+',sub:'pending',status:'todo'},
    ]},
    {name:'Deliverability', status:'todo', leaves:[
      {name:'SPF',sub:'soldmike.com',status:'todo'},
      {name:'DKIM',sub:'soldmike.com',status:'todo'},
      {name:'DMARC',sub:'soldmike.com',status:'todo'},
    ]},
    {name:'Seller Updates', status:'done', leaves:[
      {name:'Email Skill',sub:'live ✓',status:'done'},
      {name:'HTML Page',sub:'skill live ✓',status:'done'},
    ]},
    {name:'Zapier Engine', status:'done', leaves:[
      {name:'Drive Auto',sub:'FUB→Drive ✓',status:'done'},
    ]},
  ]},
  {id:'mkt', name:'Marketing', sub:'5 projects', projects:[
    {name:'Social Media', status:'done', leaves:[
      {name:'Post Skill',sub:'4 formats ✓',status:'done'},
      {name:'Metricool CSV',sub:'workflow ✓',status:'done'},
    ]},
    {name:'Landing Page', status:'done', leaves:[
      {name:'SOLDMIKE Page',sub:'live GitHub ✓',status:'done'},
    ]},
    {name:'LinkedIn Buffer', status:'done', leaves:[
      {name:'MCP Posting',sub:'confirmed ✓',status:'done'},
    ]},
    {name:'YouTube', status:'parked', leaves:[
      {name:'Strategy',sub:'Q3 2026',status:'parked'},
    ]},
    {name:'Cowork Skills', status:'prog', leaves:[
      {name:'Skills Library',sub:'30+ live',status:'done'},
    ]},
  ]},
  {id:'tpm', name:'Toronto Property Media', sub:'3 projects', projects:[
    {name:'Shot Tree', status:'done', leaves:[
      {name:'14 Shots',sub:'7 zones live ✓',status:'done'},
    ]},
    {name:'TPM Delivery', status:'done', leaves:[
      {name:'Workflow Skill',sub:'live ✓',status:'done'},
    ]},
    {name:'Sony A1 System', status:'prog', leaves:[
      {name:'Lens Workflow',sub:'12mm+50mm ✓',status:'done'},
      {name:'LUT Docs',sub:'FCP · to do',status:'todo'},
    ]},
  ]},
  {id:'prod', name:'Products', sub:'3 projects', projects:[
    {name:'Mika AI', status:'done', leaves:[
      {name:'Jotform Live',sub:'soldmike.ca ✓',status:'done'},
    ]},
    {name:'Agent Platform', status:'parked', leaves:[
      {name:'Concept',sub:'$2.5k–$5k ✓',status:'done'},
      {name:'Sales Page',sub:'to build',status:'todo'},
      {name:'Onboarding',sub:'to build',status:'todo'},
    ]},
    {name:'SOLDMIKE ISA', status:'parked', leaves:[
      {name:'AI Inside Sales',sub:'long-term',status:'parked'},
    ]},
  ]},
  {id:'biz', name:'Business & Function', sub:'5 projects', projects:[
    {name:'Email Architecture', status:'done', leaves:[
      {name:'4-Tier Setup',sub:'Mimestream ✓',status:'done'},
    ]},
    {name:'Cloudflare Worker', status:'done', leaves:[
      {name:'FUB Relay',sub:'permanent ✓',status:'done'},
    ]},
    {name:'Notion HQ', status:'prog', leaves:[
      {name:'Command Centre',sub:'live today ✓',status:'done'},
      {name:'Priority DB',sub:'live today ✓',status:'done'},
      {name:'Project Tree',sub:'live today ✓',status:'done'},
    ]},
    {name:'WordPress Site', status:'queued', leaves:[
      {name:'Hosting',sub:'Rocket.net',status:'todo'},
      {name:'Bricks Builder',sub:'~$299',status:'todo'},
      {name:'Showcase IDX',sub:'last step',status:'todo'},
    ]},
    {name:'GitHub Pages', status:'done', leaves:[
      {name:'Tools Repo',sub:'broker-svg ✓',status:'done'},
    ]},
  ]},
  {id:'per', name:'Personal', sub:'2 projects', projects:[
    {name:'Workouts', status:'prog', leaves:[
      {name:'Workout Log',sub:'Drive folder',status:'prog'},
    ]},
    {name:'Meal Plan', status:'todo', leaves:[
      {name:'Meal System',sub:'to be built',status:'todo'},
    ]},
  ]},
];

// --- CALCULATE POSITIONS ---
let leafX = LEFT_PAD + LEAF_W/2;
let counts = {done:0,prog:0,todo:0,missing:0,parked:0,blocked:0};

data.forEach(sec => {
  let secLeafStart = null;
  sec.projects.forEach(proj => {
    let projLeafStart = null;
    proj.leaves.forEach(leaf => {
      leaf.cx = leafX;
      if(projLeafStart===null) projLeafStart = leafX;
      projLeafStart = Math.min(projLeafStart, leafX);
      proj._leafEnd = leafX;
      leafX += PITCH;
      counts[leaf.status] = (counts[leaf.status]||0)+1;
    });
    proj.cx = (projLeafStart + proj._leafEnd)/2;
    if(secLeafStart===null) secLeafStart = projLeafStart;
    secLeafStart = Math.min(secLeafStart, projLeafStart);
    sec._leafEnd = Math.max(sec._leafEnd||0, proj._leafEnd);
  });
  sec.cx = (secLeafStart + sec._leafEnd)/2;
  leafX += SEC_GAP;
});

const totalWidth = leafX - SEC_GAP + LEFT_PAD;
const rootCx = (data[0].cx + data[data.length-1].cx)/2;

// Update stats
document.getElementById('s-done').textContent = counts.done||0;
document.getElementById('s-prog').textContent = counts.prog||0;
document.getElementById('s-todo').textContent = counts.todo||0;
document.getElementById('s-miss').textContent = counts.missing||0;
document.getElementById('s-park').textContent = counts.parked||0;
document.getElementById('s-block').textContent = counts.blocked||0;

// --- RENDER SVG ---
const svgH = Y_LEAF + LEAF_H/2 + 60;
const svg = document.getElementById('tree-svg');
svg.setAttribute('width', totalWidth);
svg.setAttribute('height', svgH);
svg.setAttribute('viewBox', `0 0 ${totalWidth} ${svgH}`);

let html = '';

// ROW LABELS
html += `<text class="row-lbl" x="8" y="${Y_ROOT-28}" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;fill:#c8c7c0">Row 1 — Root</text>`;
html += `<text class="row-lbl" x="8" y="${Y_SEC-28}" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;fill:#c8c7c0">Row 2 — Sections</text>`;
html += `<text class="row-lbl" x="8" y="${Y_PROJ-28}" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;fill:#c8c7c0">Row 3 — Projects</text>`;
html += `<text class="row-lbl" x="8" y="${Y_LEAF-28}" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;fill:#c8c7c0">Row 4 — Status leaves</text>`;

// SECTION ZONE BACKGROUNDS
data.forEach(sec => {
  const ss = SEC_STYLES[sec.id];
  const zx = sec.cx - (sec._leafEnd - data[sec === data[0] ? 0 : -1]?.cx || 0);
  // Use first leaf and last leaf for zone
  const firstLeaf = sec.projects[0].leaves[0].cx;
  const lastLeaf = sec.projects[sec.projects.length-1].leaves[sec.projects[sec.projects.length-1].leaves.length-1].cx;
  html += `<rect x="${firstLeaf - LEAF_W/2 - 12}" y="${Y_SEC-SEC_H/2-14}" width="${lastLeaf - firstLeaf + LEAF_W + 24}" height="${Y_LEAF - Y_SEC + LEAF_H/2 + SEC_H/2 + 28}" rx="12" fill="${ss.fill}" fill-opacity=".1" stroke="${ss.stroke}" stroke-width="1.5"/>`;
  // Zone label
  html += `<text x="${sec.cx}" y="${Y_SEC - SEC_H/2 - 4}" text-anchor="middle" style="font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;fill:${ss.stroke}">${sec.name.toUpperCase()}</text>`;
});

// ROOT NODE
function node(cx, cy, w, h, fill, stroke, dash, label, sub, tf, sf) {
  const x = cx-w/2, y = cy-h/2, r = 8;
  const da = dash ? 'stroke-dasharray="5 4"' : '';
  html += `<g>`;
  html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${da}/>`;
  html += `<text x="${cx}" y="${cy - 5}" text-anchor="middle" style="font-size:13px;font-weight:600;fill:${tf}">${label}</text>`;
  if(sub) html += `<text x="${cx}" y="${cy + 10}" text-anchor="middle" style="font-size:10px;fill:${sf}">${sub}</text>`;
  html += `</g>`;
}

function connector(x1,y1,x2,y2,color){
  const my = (y1+y2)/2;
  html += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" stroke="${color||'#c8c7c0'}" stroke-width="1.5" fill="none"/>`;
}

// Root → Sections connectors
data.forEach(sec => {
  connector(rootCx, Y_ROOT+ROOT_H/2, sec.cx, Y_SEC-SEC_H/2, SEC_STYLES[sec.id].stroke);
});

// Root node
html += `<rect x="${rootCx-ROOT_W/2}" y="${Y_ROOT-ROOT_H/2}" width="${ROOT_W}" height="${ROOT_H}" rx="10" fill="#1a1a18" stroke="#444441" stroke-width="1.5"/>`;
html += `<text x="${rootCx}" y="${Y_ROOT-5}" text-anchor="middle" style="font-size:14px;font-weight:600;fill:#fff">SOLDMIKE</text>`;
html += `<text x="${rootCx}" y="${Y_ROOT+11}" text-anchor="middle" style="font-size:10px;fill:#888780">Master Project Tree · April 2026</text>`;

// Sections, Projects, Leaves
data.forEach(sec => {
  const ss = SEC_STYLES[sec.id];

  // Section node
  node(sec.cx, Y_SEC, SEC_W, SEC_H, ss.fill, ss.stroke, false, sec.name.length>18 ? sec.name.substring(0,17)+'…' : sec.name, sec.sub, ss.tf, ss.tf);

  sec.projects.forEach(proj => {
    const ps = ST[proj.status] || ST.todo;

    // Section → Project connector
    connector(sec.cx, Y_SEC+SEC_H/2, proj.cx, Y_PROJ-PROJ_H/2, ss.stroke);

    // Project node
    const pname = proj.name.length>16 ? proj.name.substring(0,15)+'…' : proj.name;
    node(proj.cx, Y_PROJ, PROJ_W, PROJ_H, ps.fill, ps.stroke, ps.dash, pname, proj.status.toUpperCase(), ps.tf, ps.sf);

    proj.leaves.forEach(leaf => {
      const ls = ST[leaf.status] || ST.todo;

      // Project → Leaf connector
      const dashLine = ls.dash;
      if(dashLine){
        html += `<path d="M${proj.cx},${Y_PROJ+PROJ_H/2} C${proj.cx},${(Y_PROJ+PROJ_H/2+Y_LEAF-LEAF_H/2)/2} ${leaf.cx},${(Y_PROJ+PROJ_H/2+Y_LEAF-LEAF_H/2)/2} ${leaf.cx},${Y_LEAF-LEAF_H/2}" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>`;
      } else {
        connector(proj.cx, Y_PROJ+PROJ_H/2, leaf.cx, Y_LEAF-LEAF_H/2, ps.stroke);
      }

      // Leaf node
      const lname = leaf.name.length>12 ? leaf.name.substring(0,11)+'…' : leaf.name;
      const lsub = leaf.sub.length>13 ? leaf.sub.substring(0,12)+'…' : leaf.sub;
      node(leaf.cx, Y_LEAF, LEAF_W, LEAF_H, ls.fill, ls.stroke, ls.dash, lname, lsub, ls.tf, ls.sf);
    });
  });
});

svg.innerHTML = html;
</script>
</body>
</html>
