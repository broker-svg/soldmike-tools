<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;min-height:100vh;color:#e8e8f0}

.top{background:#14141f;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a3d}
.top h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.top h1 .brand{color:#c8a84e;font-size:11px;font-weight:400;letter-spacing:1px}
.top-right{display:flex;align-items:center;gap:10px}
.nav-btn{color:#8888a0;text-decoration:none;font-size:12px;padding:5px 12px;border:1px solid #2a2a3d;border-radius:6px;transition:all .2s;cursor:pointer;background:none}
.nav-btn:hover{border-color:#c8a84e;color:#c8a84e}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:#14141f;border-bottom:1px solid #2a2a3d;padding:0 24px}
.vtab{padding:10px 20px;font-size:13px;font-weight:600;color:#8888a0;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.vtab:hover{color:#e8e8f0}
.vtab.active{color:#c8a84e;border-bottom-color:#c8a84e}

.view{display:none}
.view.active{display:block}

/* ===== SIMPLE VIEW ===== */
.simple-wrap{padding:24px;overflow:auto}
.simple-inner{min-width:1400px;background:#14141f;border-radius:14px;border:1px solid #2a2a3d;padding:32px 36px 44px;display:inline-block}
/* Simple tree nodes - clean gray/white */
.sn rect{fill:#1c1c2e;stroke:#3a3a4d;stroke-width:1}
.sn .sth{font-size:12px;font-weight:600;fill:#e8e8f0}
.sn .sts{font-size:10px;fill:#6b6b80}
/* Leaf style - lighter so they pop */
.sl rect{fill:#262640;stroke:#4a4a6a;stroke-width:1}
.sl .sth{font-size:11px;font-weight:600;fill:#d0d0e0}
.sl .sts{font-size:9px;fill:#8888a0}
.sn-root rect{fill:#1c1c2e;stroke:#6b6b80;stroke-width:1.5}
.sn-root .sth{fill:#e8e8f0;font-size:13px}
.sn-done .sts{fill:#5a5a70}
.sn-done .sth::after{content:' done'}
.sconn{stroke:#3a3a4d;stroke-width:1.2;fill:none}
.srow-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;fill:#4a4a5e}

/* ===== DEPENDENCY VIEW ===== */
.dep-wrap{padding:24px;overflow:auto}
.dep-inner{min-width:1800px;background:#14141f;border-radius:14px;border:1px solid #2a2a3d;padding:32px 36px 44px;display:inline-block}
svg{display:block}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.th{font-size:12px;font-weight:600;fill:#e8e8f0}
.ts{font-size:10px;fill:#8888a0}
.row-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;fill:#9a7d3a}
.n-root rect{fill:#1c1c2e;stroke:#c8a84e;stroke-width:2}
.n-done rect{fill:rgba(52,211,153,.08);stroke:#34d399;stroke-width:1.5}
.n-done .th{fill:#34d399}
.n-active rect{fill:rgba(251,191,36,.08);stroke:#fbbf24;stroke-width:1.5}
.n-active .th{fill:#fbbf24}
.n-queued rect{fill:rgba(96,165,250,.08);stroke:#60a5fa;stroke-width:1.5}
.n-queued .th{fill:#60a5fa}
.n-blocked rect{fill:rgba(248,113,113,.08);stroke:#f87171;stroke-width:1.5;stroke-dasharray:5 3}
.n-blocked .th{fill:#f87171}
.n-pending rect{fill:rgba(136,136,160,.06);stroke:#4a4a5e;stroke-width:1}
.n-pending .th{fill:#8888a0}
.conn{stroke:#3a3a4d;stroke-width:1.5;fill:none}
.conn-block{stroke:#f87171;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
.conn-done{stroke:#34d399;stroke-width:1.5;fill:none;opacity:.4}
.conn-dep{stroke:#c8a84e;stroke-width:1.5;fill:none;stroke-dasharray:8 4}

.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 24px;background:#14141f;border-bottom:1px solid #2a2a3d;font-size:11px;color:#8888a0;align-items:center}
.legend strong{color:#e8e8f0}
.ld{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}

@media(max-width:900px){
  .zone-cards{grid-template-columns:1fr}
  .exec-bar{flex-direction:column;align-items:flex-start}
}
</style>
