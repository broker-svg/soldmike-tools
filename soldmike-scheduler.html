  let scheduled = 0, pending = 0;

  posts.forEach((post, idx) => {
    if (post.status === 'scheduled') scheduled++;
    else if (!post.imageUrl) pending++;

    const d = new Date(post.date);
    const dayStr = d.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});

    const card = document.createElement('div');
    card.className = `post-card ${post.status}`;
    card.id = `card-${post.id}`;

    const platformBadges = post.platforms.map(p => {
      const labels = {ig:'IG', fb:'FB', li:'LI'};
      return `<span class="platform-badge p-${p}">${labels[p]}</span>`;
    }).join('');

    const statusLabel = {
      pending: `<span class="card-status status-pending">Pending</span>`,
      scheduled: `<span class="card-status status-live">✓ Scheduled</span>`,
      error: `<span class="card-status status-error">Error</span>`
    }[post.status] || '';

    const preview = post.caption.split('\n')[0].replace(/[✨🏡🌿📊🏠💡📋🎯🧠📈🔑💪📩]/g,'').trim();

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${post.id}')">
        <div class="post-date"><strong>${d.toLocaleDateString('en-CA',{weekday:'short'}).toUpperCase()} ${d.getDate()}</strong>9:00 AM</div>
        <div class="post-property">${post.property}</div>
        <div class="post-preview">${preview}</div>
        <div class="platforms">${platformBadges}</div>
        ${statusLabel}
        <span class="chevron" id="chev-${post.id}">▼</span>
      </div>
      <div class="card-body" id="body-${post.id}">
        <div class="field-group">
          <div class="field-label">Caption</div>
          <textarea id="caption-${post.id}" oninput="updateCaption('${post.id}', this.value)">${post.caption}</textarea>
        </div>
        <div class="field-group">
          <div class="field-label">Image URL (Cloudinary / Public Link)</div>
          <div class="url-row">
            <input type="url" id="img-${post.id}" placeholder="https://res.cloudinary.com/dgjwvyjbu/..." 
              value="${post.imageUrl}"
              onchange="updateImage('${post.id}', this.value)"
              oninput="updateImage('${post.id}', this.value)" />
            <img id="preview-${post.id}" class="image-preview ${post.imageUrl ? 'loaded':''}" 
              src="${post.imageUrl || ''}" 
              onerror="this.classList.remove('loaded')" 
              onload="this.classList.add('loaded')" />
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline" onclick="scheduleOne('${post.id}')">Schedule This Post</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Update stats
  document.getElementById('statTotal').textContent = posts.length;
  document.getElementById('statScheduled').textContent = scheduled;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('readyCount').textContent = posts.length - pending;
  document.getElementById('pendingCount').textContent = pending;
}

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}
function expandAll() { posts.forEach(p => { document.getElementById(`body-${p.id}`)?.classList.add('open'); document.getElementById(`chev-${p.id}`)?.classList.add('open'); }); }
function collapseAll() { posts.forEach(p => { document.getElementById(`body-${p.id}`)?.classList.remove('open'); document.getElementById(`chev-${p.id}`)?.classList.remove('open'); }); }

function updateCaption(id, val) { posts.find(p=>p.id===id).caption = val; }
function updateImage(id, val) {
  const post = posts.find(p=>p.id===id);
  post.imageUrl = val;
  const img = document.getElementById(`preview-${id}`);
  if (val) { img.src = val; }
  else { img.classList.remove('loaded'); }
}

// ── API ──
async function checkAPI() {
  const dot = document.getElementById('apiDot');
  const label = document.getElementById('apiStatus');
  dot.style.background = '#c9a84c';
  label.textContent = 'Checking...';
  try {
    const r = await fetch(`${BASE_URL}/api/admin/simpleProfiles`, {
      headers: { 'X-Mc-Auth': METRICOOL_TOKEN }
    });
    if (r.ok) {
      dot.style.background = 'var(--green)';
      dot.style.boxShadow = '0 0 8px var(--green)';
      label.textContent = 'Metricool Connected ✓';
      toast('✓ Metricool API is live', 'success');
    } else {
      throw new Error(`${r.status}`);
    }
  } catch(e) {
    dot.style.background = 'var(--red)';
    dot.style.boxShadow = '0 0 8px var(--red)';
    label.textContent = 'API Error — check token';
    toast('⚠ API check failed: ' + e.message, 'error');
  }
}

async function postToMetricool(post) {
  // Convert platform codes to Metricool network names
  const networkMap = { ig: 'instagram', fb: 'facebook', li: 'linkedin' };
  const networks = post.platforms.map(p => ({
    network: networkMap[p],
    publishDate: post.date.replace('T', ' ').substring(0, 16)
  }));

  const body = {
    blogId: BLOG_ID,
    text: post.caption,
    networks: networks,
    ...(post.imageUrl ? { images: [{ url: post.imageUrl }] } : {})
  };

  const response = await fetch(`${BASE_URL}/api/v2/scheduler/posts`, {
    method: 'POST',
    headers: {
      'X-Mc-Auth': METRICOOL_TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`${response.status}: ${err}`);
  }
  return await response.json();
}

async function scheduleOne(id) {
  const post = posts.find(p=>p.id===id);
  const card = document.getElementById(`card-${id}`);
  try {
    await postToMetricool(post);
    post.status = 'scheduled';
    card.className = 'post-card scheduled';
    toast(`✓ Scheduled: ${post.property} on ${new Date(post.date).toLocaleDateString()}`, 'success');
    render();
  } catch(e) {
    post.status = 'error';
    card.className = 'post-card error';
    toast(`✗ Failed: ${e.message}`, 'error');
  }
}

async function scheduleAll() {
  const btn = document.getElementById('scheduleAllBtn');
  btn.disabled = true;
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.style.display = 'block';
  fill.style.width = '0%';

  let done = 0;
  const toSchedule = posts.filter(p => p.status !== 'scheduled');
  
  for (const post of toSchedule) {
    try {
      await postToMetricool(post);
      post.status = 'scheduled';
      toast(`✓ ${post.property} — ${new Date(post.date).toLocaleDateString('en-CA',{month:'short',day:'numeric'})}`, 'success');
    } catch(e) {
      post.status = 'error';
      toast(`✗ ${post.property}: ${e.message}`, 'error');
    }
    done++;
    fill.style.width = `${(done/toSchedule.length)*100}%`;
    await new Promise(r => setTimeout(r, 600)); // rate limit buffer
    render();
  }
  
  btn.disabled = false;
  bar.style.display = 'none';
  toast(`🎯 Done — ${posts.filter(p=>p.status==='scheduled').length} posts scheduled`, 'success');
}

async function scheduleReady() {
  const ready = posts.filter(p => p.status !== 'scheduled' && p.imageUrl);
  if (!ready.length) { toast('No posts with images ready yet', 'error'); return; }
  for (const post of ready) {
    try {
      await postToMetricool(post);
      post.status = 'scheduled';
      toast(`✓ ${post.property}`, 'success');
    } catch(e) {
      post.status = 'error';
    }
    await new Promise(r => setTimeout(r, 600));
    render();
  }
}

// ── TOAST ──
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── INIT ──
render();
setTimeout(checkAPI, 800);
</script>
</body>
</html>
